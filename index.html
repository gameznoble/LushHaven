<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LushHaven | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="nav">
        <div class="logo"><span>LUSH</span>HAVEN</div>
        <div class="links">
            <a href="index.html" class="active">Home</a>
            <a href="rules.html">Rules</a>
            <a href="mods.html">Allowed Mods</a>
            <a href="https://lushhaven.tebex.io/">Store</a>
            <a href="https://discord.gg/yourlink" class="nav-discord" target="_blank">
                <i class="fab fa-discord"></i>
            </a>
        </div>
    </div>
</header>

<main class="hero-container">
    <section class="hero-content">
        <div class="badge">SERVER STATUS: ONLINE</div>
        <h1>Enter the <span>Haven.</span></h1>
        <p>Join the ultimate community-driven experience. Explore, build, and conquer with a custom economy and dedicated staff.</p>
        
        <div class="hero-actions">
            <a href="https://discord.gg/yourlink" class="btn-discord-main" target="_blank">
                <i class="fab fa-discord"></i> Join Our Discord
            </a>
            
            <button class="btn-copy-ip" onclick="copyIP()">
                <i class="fas fa-server"></i>
                <span id="ipText">play.lushhaven.com</span>
            </button>
        </div>
    </section>
</main>

<script>
    function copyIP() {
        const ip = "play.lushhaven.com";
        navigator.clipboard.writeText(ip);
        const btnText = document.getElementById('ipText');
        btnText.innerText = "IP Copied!";
        setTimeout(() => { btnText.innerText = ip; }, 2000);
    }
</script>

</body>
</html>
