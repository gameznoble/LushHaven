<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LushHaven | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="home-bg">

<div class="bg-animate"></div>

<header>
    <div class="nav">
        <div class="logo">LUSH<span>HAVEN</span></div>
        <div class="links">
            <a href="index.html" class="active">Home</a>
            <a href="rules.html">Rules</a>
            <a href="mods.html">Allowed Mods</a>
            <a href="https://lushhaven.tebex.io/">Store</a>
        </div>
    </div>
</header>

<main class="hero-wrapper">
    <div class="hero-content">
        <div class="badge">UNDER DEVELOPMENT</div>
        <h1>Lush<span>Haven</span></h1>
        <p>A custom Minecraft survival project focused on community and fair play. Join us and help build the foundation.</p>
        
        <div class="hero-btns">
            <button class="btn-main" onclick="copyIP()">
                <i class="fas fa-copy"></i> Copy IP
            </button>
            <a href="rules.html" class="btn-sub">Read Rules</a>
        </div>
        
        <div class="server-status">
            <div class="status-dot"></div>
            <span class="ip-text">lushhaven.my.pebble.host</span>
        </div>
    </div>
</main>

<script>
    function copyIP() {
        navigator.clipboard.writeText("lushhaven.my.pebble.host");
        const btn = document.querySelector('.btn-main');
        btn.innerHTML = "<i class='fas fa-check'></i> Copied!";
        setTimeout(() => {
            btn.innerHTML = "<i class='fas fa-copy'></i> Copy IP";
        }, 2000);
    }
</script>

</body>
</html>
