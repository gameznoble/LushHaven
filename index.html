<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LushHaven | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="nav">
        <div class="logo"><span>LUSH</span>HAVEN</div>
        <div class="links">
            <a href="index.html" class="active">Home</a>
            <a href="rules.html">Rules</a>
            <a href="mods.html">Allowed Mods</a>
            <a href="https://lushhaven.tebex.io/">Store</a>
            <a href="https://discord.gg/uBe9tJNKxu" class="discord-btn-nav" target="_blank">
                <i class="fab fa-discord"></i> Join
            </a>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <div class="status-badge"><i class="fas fa-circle"></i> Server Online</div>
        <h1>Enter the <span>Haven.</span></h1>
        <p>Experience the next generation of community gaming. High performance, custom features, and a dedicated staff team.</p>
        
        <div class="hero-btns">
            <a href="https://discord.gg/uBe9tJNKxu" class="discord-btn-hero" target="_blank">
                <i class="fab fa-discord"></i> Join Our Discord
            </a>
            
            <button class="ip-btn" onclick="copyIP()">
                <i class="fas fa-server"></i> <span id="ipText">play.lushhaven.com</span>
            </button>
        </div>
    </div>
</section>

<script>
    function copyIP() {
        const ip = "play.lushhaven.com";
        navigator.clipboard.writeText(ip);
        const text = document.getElementById('ipText');
        text.innerText = "IP Copied!";
        setTimeout(() => { text.innerText = ip; }, 2000);
    }
</script>

</body>
</html>
