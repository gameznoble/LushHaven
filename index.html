<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LushHaven | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<header>
    <div class="nav">
        <div class="logo"><span>LUSH</span>HAVEN</div>
        <div class="links">
            <a href="index.html" class="active">Home</a>
            <a href="rules.html">Rules</a>
            <a href="mods.html">Allowed Mods</a>
            <a href="https://lushhaven.tebex.io/">Store</a>
        </div>
    </div>
</header>
<main class="main-wrapper">
    <section class="hero-section">
        <div class="badge">SEASON ONE IS LIVE</div>
        <h1>Enter the <span>Haven.</span></h1>
        <p>Experience the ultimate Skyblock adventure with a custom economy, balanced gameplay, and a community that actually matters.</p>
        <div class="hero-btns">
            <a href="rules.html" class="btn-main">Visit Rules</a>
            <button class="btn-ip" onclick="copyIP()">
                <i class="fas fa-copy"></i>
                <span id="ipDisplay">play.lushhaven.com</span>
            </button>
        </div>
    </section>
</main>

<script>
    function copyIP() {
        const ip = "play.lushhaven.com";
        navigator.clipboard.writeText(ip);
        const display = document.getElementById('ipDisplay');
        display.innerText = "Copied!";
        setTimeout(() => { display.innerText = ip; }, 2000);
    }
</script>
</body>
</html>
