<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LushHaven | Mods</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="nav">
        <div class="logo">LUSH<span>HAVEN</span></div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="rules.html">Rules</a>
            <a href="mods.html" class="active">Allowed Mods</a>
            <a href="https://lushhaven.tebex.io/">Store</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="rules-header">
        <h1>Client <span>Modifications</span></h1>
        <p>Search for specific mods or click to see why they are allowed/disallowed.</p>
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="modSearch" placeholder="Search mods..." onkeyup="filterMods()">
        </div>
    </div>

    <div class="mod-layout">
        <div class="mod-column">
            <h2 class="tier-title t2-text">Allowed</h2>
            <div class="mod-grid">
                <div class="rule-node" onclick="openModal('Performance', 'Optifine, Sodium, Lithium, Phosphor.', 'ALLOWED', 't2-bg')">Performance Mods</div>
                <div class="rule-node" onclick="openModal('Visuals', 'Shaders, Resource Packs, Clear Skies.', 'ALLOWED', 't2-bg')">Shaders/Visuals</div>
            </div>
        </div>
        <div class="mod-column">
            <h2 class="tier-title t3-text">Disallowed</h2>
            <div class="mod-grid">
                <div class="rule-node danger" onclick="openModal('Hacked Clients', 'Any client with unfair advantages.', 'PERM BAN', 't3-bg')">Hacked Clients</div>
                <div class="rule-node danger" onclick="openModal('X-Ray', 'Texture packs or mods that see through blocks.', '7d BAN ➔ PERM', 't3-bg')">X-Ray</div>
            </div>
        </div>
    </div>
</div>

<div id="modModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">Mod Name</h2>
        <div class="modal-divider"></div>
        <p id="modalDesc">Description</p>
        <div id="pContainer" class="punishment-banner">
            <span class="banner-label">SERVER STATUS</span>
            <span id="modalStatus" class="banner-steps">Status</span>
        </div>
        <button class="btn-close" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const modal = document.getElementById("modModal");
    function openModal(t, d, s, c) {
        document.getElementById("modalTitle").innerText = t;
        document.getElementById("modalDesc").innerText = d;
        document.getElementById("modalStatus").innerText = s;
        document.getElementById("pContainer").className = "punishment-banner " + c;
        modal.style.display = "flex";
    }
    function closeModal() { modal.style.display = "none"; }
    function filterMods() {
        let input = document.getElementById('modSearch').value.toLowerCase();
        let nodes = document.getElementsByClassName('rule-node');
        for (let i = 0; i < nodes.length; i++) {
            nodes[i].style.display = nodes[i].innerText.toLowerCase().includes(input) ? "block" : "none";
        }
    }
    window.onclick = (e) => { if (e.target == modal) closeModal(); }
</script>
</body>
</html>
