<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LushHaven | Mods</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="nav">
        <div class="logo">LUSH<span>HAVEN</span></div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="rules.html">Rules</a>
            <a href="mods.html" class="active">Allowed Mods</a>
            <a href="https://lushhaven.tebex.io/">Store</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="rules-header">
        <h1>Client <span>Modifications</span></h1>
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="modSearch" placeholder="Search mods..." onkeyup="filterMods()">
        </div>
    </div>

    <h2 class="tier-title status-green">Permitted</h2>
    <div class="rule-grid">
        <div class="rule-node status-green-bg" onclick="openMod('Vivecraft', 'Minecraft VR modifications.', 'PERMITTED', 'status-green-bg', 'STATUS')">Vivecraft</div>
        <div class="rule-node status-green-bg" onclick="openMod('Optifine', 'Performance and shaders.', 'PERMITTED', 'status-green-bg', 'STATUS')">Optifine</div>
        <div class="rule-node status-green-bg" onclick="openMod('PvP Clients', 'Badlion, Lunar, and Cosmic Client.', 'PERMITTED', 'status-green-bg', 'STATUS')">PvP Clients</div>
        <div class="rule-node status-green-bg" onclick="openMod('HUD Mods', 'ArmorStatus, Saturation, Co-ordinates.', 'PERMITTED', 'status-green-bg', 'STATUS')">HUD Mods</div>
    </div>

    <h2 class="tier-title status-yellow">Non-Malicious</h2>
    <div class="rule-grid">
        <div class="rule-node status-yellow-bg" onclick="openMod('Printer', 'Easy Place / Safe Place behavior.', '1d ➔ 3d ➔ 7d ➔ 14d ➔ PERM', 'status-yellow-bg', 'PUNISHMENT LADDER')">Printer</div>
        <div class="rule-node status-yellow-bg" onclick="openMod('Auto-Clickers', 'Using weights or minor scripts for AFK.', '1d ➔ 3d ➔ 7d ➔ 14d ➔ PERM', 'status-yellow-bg', 'PUNISHMENT LADDER')">AFK Auto-Clickers</div>
    </div>

    <h2 class="tier-title status-red">Malicious</h2>
    <div class="rule-grid">
        <div class="rule-node status-red-bg" onclick="openMod('X-Ray', 'Texture packs or mods that see through blocks.', '7d ➔ 14d ➔ 30d ➔ PERM', 'status-red-bg', 'PUNISHMENT LADDER')">X-Ray</div>
        <div class="rule-node status-red-bg" onclick="openMod('Hacked Clients', 'Vape, Future, Meteor, etc.', '7d ➔ 14d ➔ 30d ➔ PERM', 'status-red-bg', 'PUNISHMENT LADDER')">Hacked Clients</div>
        <div class="rule-node status-red-bg" onclick="openMod('Fly / Boosts', 'Movement hacks or speed boosts.', '7d ➔ 14d ➔ 30d ➔ PERM', 'status-red-bg', 'PUNISHMENT LADDER')">Fly Hacks</div>
    </div>
</div>

<div id="modModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">Mod Name</h2>
        <div class="modal-divider"></div>
        <p id="modalDesc"></p>
        
        <div id="statusBox" class="punishment-banner">
            <span id="modalLabel" class="banner-label">LABEL</span>
            <span id="modalValue" class="banner-steps">VALUE</span>
        </div>

        <button class="btn-close" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const modal = document.getElementById("modModal");
    function openMod(title, desc, value, bgClass, label) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalDesc").innerText = desc;
        document.getElementById("modalLabel").innerText = label;
        document.getElementById("modalValue").innerText = value;
        document.getElementById("statusBox").className = "punishment-banner " + bgClass;
        modal.style.display = "flex";
    }
    function closeModal() { modal.style.display = "none"; }
    function filterMods() {
        let input = document.getElementById('modSearch').value.toLowerCase();
        let nodes = document.getElementsByClassName('rule-node');
        for (let i = 0; i < nodes.length; i++) {
            nodes[i].style.display = nodes[i].innerText.toLowerCase().includes(input) ? "block" : "none";
        }
    }
    window.onclick = (e) => { if (e.target == modal) closeModal(); }
</script>
</body>
</html>
