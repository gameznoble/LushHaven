<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LushHaven | Mods</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<header>
    <div class="nav">
        <div class="logo"><span>LUSH</span>HAVEN</div>
        <div class="links"><a href="index.html">Home</a><a href="rules.html">Rules</a><a href="mods.html" class="active">Allowed Mods</a><a href="https://lushhaven.tebex.io/">Store</a></div>
    </div>
</header>
<div class="container">
    <div class="rules-header"><h1>Allowed <span>Modifications</span></h1></div>
    
    <h2 class="tier-title status-green">Permitted</h2>
    <div class="rule-grid">
        <div class="rule-node status-green-bg" onclick="openPop('Optifine', 'Performance optimization.', 'ALLOWED')">Optifine/Sodium</div>
        <div class="rule-node status-green-bg" onclick="openPop('Minimaps', 'Surface maps only. No caves/players.', 'ALLOWED')">Minimaps</div>
        <div class="rule-node status-green-bg" onclick="openPop('PvP Clients', 'Lunar, Badlion, etc.', 'ALLOWED')">PvP Clients</div>
    </div>

    <h2 class="tier-title status-red">Disallowed</h2>
    <div class="rule-grid">
        <div class="rule-node status-red-bg" onclick="openPop('X-Ray', 'Seeing ores/chests.', '7d ➔ 30d ➔ PERM')">X-Ray</div>
        <div class="rule-node status-red-bg" onclick="openPop('Auto-Clickers', 'Automation of clicking.', '7d ➔ 14d ➔ PERM')">Auto-Clickers</div>
        <div class="rule-node status-red-bg" onclick="openPop('Hacks', 'Fly, Speed, KillAura.', 'Permanent Ban')">Hacked Clients</div>
    </div>
</div>

<div id="m" class="modal"><div class="modal-content"><h2 id="mT"></h2><p id="mD" style="margin:20px 0; color:#888"></p><div id="mB" class="punishment-banner"><span class="banner-label">STATUS</span><span id="mS" class="banner-steps"></span></div><button class="btn-close" onclick="closePop()">Close</button></div></div>

<script>
    function openPop(t,d,s){
        document.getElementById('mT').innerText=t;
        document.getElementById('mD').innerText=d;
        document.getElementById('mS').innerText=s;
        document.getElementById('m').style.display='flex';
    }
    function closePop(){document.getElementById('m').style.display='none';}
</script>
</body>
</html>
